<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global News Hub</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; padding: 20px; color: #333; }
        #news-container { max-width: 800px; margin: 0 auto; display: grid; gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .content { padding: 20px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 0.75em; background: #e0e7ff; color: #4338ca; margin-bottom: 10px; }
        h3 { margin: 0 0 10px 0; font-size: 1.25em; line-height: 1.4; }
        a { color: #4338ca; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div id="news-container"></div>

    <script>
        async function fetchNews() {
            const container = document.getElementById('news-container');
            try {
                const res = await fetch('/api/news');
                const data = await res.json();
                container.innerHTML = data.map(item => `
                    <div class="card">
                        ${item.image_url ? `<img src="${item.image_url}" alt="Noticia">` : ''}
                        <div class="content">
                            <span class="badge">${item.category} • ${item.name}</span>
                            <h3>${item.title}</h3>
                            <a href="${item.link}" target="_blank">Leer completa →</a>
                        </div>
                    </div>
                `).join('');
            } catch (err) { container.innerHTML = '<p>Error al cargar.</p>'; }
        }
        fetchNews();
    </script>
</body>
</html>
