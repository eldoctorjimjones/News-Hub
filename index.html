<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Doctor News Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; --text: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        
        #search-bar { width: 100%; max-width: 500px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; margin-bottom: 20px; }
        nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        button { padding: 8px 18px; border: none; border-radius: 20px; cursor: pointer; background: #e2e8f0; font-weight: 600; }
        button.active { background: var(--primary); color: white; }
        
        #news-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; padding: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
        .card h3 { font-size: 1.1rem; line-height: 1.4; margin: 0 0 10px 0; }
        .card a { color: var(--primary); font-weight: 600; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <header><h1>El Doctor News Hub</h1></header>
        <input type="text" id="search-bar" placeholder="🔍 Buscar noticias...">
        <nav id="filters">
            <button class="active" onclick="filter('Todas')">Todas</button>
            <button onclick="filter('Global')">Global</button>
            <button onclick="filter('Tech')">Tecnología</button>
            <button onclick="filter('Science')">Ciencia</button>
        </nav>
        <div id="news-container"></div>
    </div>

    <script>
        let allNews = [];
        async function load() {
            const res = await fetch('/api/news');
            allNews = await res.json();
            render(allNews);
        }
        function render(data) {
            document.getElementById('news-container').innerHTML = data.map(n => `
                <div class="card">
                    ${n.image_url ? `<img src="${n.image_url}" onerror="this.style.display='none'">` : ''}
                    <h3>${n.title}</h3>
                    <small style="color:#64748b">${n.category} • ${n.name}</small><br>
                    <a href="${n.link}" target="_blank">Leer completa →</a>
                </div>
            `).join('');
        }
        function filter(cat) {
            document.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.innerText === cat));
            render(cat === 'Todas' ? allNews : allNews.filter(n => n.category === cat));
        }
        document.getElementById('search-bar').addEventListener('input', e => {
            const t = e.target.value.toLowerCase();
            render(allNews.filter(n => n.title.toLowerCase().includes(t)));
        });
        load();
    </script>
</body>
</html>
