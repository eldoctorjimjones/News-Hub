<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Doctor News Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Stalinist+One&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #dc2626; --bg: #f8fafc; --text: #1e293b; --card-bg: #ffffff; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { font-family: 'Stalinist One', cursive; font-size: 2.5rem; color: var(--primary); margin: 0; text-shadow: 2px 2px 0px #0f172a; }
        
        #search-bar { width: 100%; max-width: 600px; padding: 12px 20px; border: 2px solid #e2e8f0; border-radius: 50px; margin-bottom: 20px; font-size: 1rem; transition: border-color 0.3s; }
        #search-bar:focus { outline: none; border-color: var(--primary); }
        
        nav { display: flex; justify-content: center; gap: 8px; margin-bottom: 30px; flex-wrap: wrap; }
        button, select { padding: 8px 18px; border: 1px solid #e2e8f0; border-radius: 20px; cursor: pointer; background: white; font-weight: 600; transition: all 0.2s; }
        button.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        #news-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; opacity: 1; transition: opacity 0.3s ease-in; }
        .card { background: var(--card-bg); border-radius: 12px; padding: 16px; box-shadow: var(--shadow); display: flex; flex-direction: column; border: 1px solid #e2e8f0; transition: transform 0.2s; }
        .card:hover { transform: translateY(-4px); }
        .card img { width: 100%; height: 160px; object-fit: cover; border-radius: 8px; margin-bottom: 12px; background: #f1f5f9; }
        .card small { font-size: 0.65rem; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; }
        .card h3 { font-size: 1.05rem; line-height: 1.3; margin: 0 0 12px 0; }
        .link-container { margin-top: auto; padding-top: 12px; }
        .link-container a { color: var(--primary); font-weight: 600; text-decoration: none; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>EL DOCTOR NEWS HUB</h1>
            <p>Radar Informativo Global</p>
        </header>
        
        <div style="text-align: center;">
            <input type="text" id="search-bar" placeholder="🔍 Buscar en todas las noticias...">
        </div>
        
        <nav id="filters">
            <button class="active" onclick="filter('Todas', this)">Todas</button>
            <button onclick="filter('América', this)">América</button>
            <button onclick="filter('Europa', this)">Europa</button>
            <button onclick="filter('España', this)">España</button>
            <button onclick="filter('Asia', this)">Asia</button>
            <button onclick="filter('África', this)">África</button>
            <button onclick="filter('Tech', this)">Tecnología</button>
            <select id="horny-dropdown" onchange="filter(this.value, this)">
                <option value="">Horny Report 🎙️</option>
            </select>
        </nav>
        
        <div id="loader" style="text-align:center; padding: 40px;">Cargando, por favor espera...</div>
        <div id="news-container"></div>
    </div>

    <script>
        let allNews = [];
        let searchTimeout;
        const container = document.getElementById('news-container');
        const loader = document.getElementById('loader');

        async function load() {
            try {
                const res = await fetch('/api/news');
                allNews = await res.json();
                loader.style.display = 'none';
                render(allNews);
                generateHornyMenu(allNews);
            } catch (err) {
                loader.innerHTML = '⚠️ Error conectando al servidor. Recarga la página.';
            }
        }
        
        function render(data) {
            container.style.opacity = '0';
            setTimeout(() => {
                container.innerHTML = data.map(n => `
                    <div class="card">
                        ${(n.image_url && n.image_url !== 'null') ? `<img src="${n.image_url}" onerror="this.style.display='none'">` : ''}
                        <div>
                            <small>${n.category || 'General'}</small>
                            <h3>${n.title}</h3>
                        </div>
                        <div class="link-container"><a href="${n.link}" target="_blank">Leer fuente →</a></div>
                    </div>
                `).join('');
                container.style.opacity = '1';
            }, 150);
        }

        function filter(cat, el) {
            // UI Logic
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            if (el.tagName === 'BUTTON') el.classList.add('active');
            
            // Filter Logic
            const filtered = (cat === 'Todas' || cat === '') ? allNews : allNews.filter(n => (n.category || '').toLowerCase().includes(cat.toLowerCase()));
            render(filtered);
        }

        document.getElementById('search-bar').addEventListener('input', e => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                const t = e.target.value.toLowerCase();
                render(allNews.filter(n => n.title.toLowerCase().includes(t) || (n.category && n.category.toLowerCase().includes(t))));
            }, 300);
        });

        function generateHornyMenu(data) {
            const select = document.getElementById('horny-dropdown');
            const programs = [...new Set(data.map(n => n.category).filter(c => c && c.startsWith('Horny Report')))].sort();
            programs.forEach(prog => {
                const opt = document.createElement('option');
                opt.value = prog; opt.innerText = prog;
                select.appendChild(opt);
            });
        }
        
        load();
    </script>
</body>
</html>
