<script>
    function render(data) {
        const container = document.getElementById('news-container');
        const isHornyView = document.querySelector('button.active').innerText.includes('Horny Report');
        
        if (isHornyView) {
            const grupos = data.reduce((acc, item) => {
                if (item.category === 'Horny Report') {
                    if (!acc[item.name]) acc[item.name] = [];
                    acc[item.name].push(item);
                }
                return acc;
            }, {});

            container.innerHTML = Object.keys(grupos).map(nombreProg => `
                <details open style="background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 20px;">
                    <summary style="cursor: pointer; font-weight: 800; font-size: 1.4rem; color: #dc2626; padding-bottom: 10px;">${nombreProg}</summary>
                    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 10px;">
                        ${grupos[nombreProg].map(n => `
                            <div style="border: 1px solid #f1f5f9; border-radius: 12px; padding: 10px; display: flex; flex-direction: column;">
                                ${n.image_url ? `<img src="${n.image_url}" style="width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 10px;">` : ''}
                                <a href="${n.link}" target="_blank" style="text-decoration: none; color: #1e293b; font-weight: 600; font-size: 0.9rem;">${n.title}</a>
                            </div>
                        `).join('')}
                    </div>
                </details>
            `).join('');
        } else {
            // ... (resto de tu vista normal)
        }
    }
</script>
