<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>El Doctor News Hub</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .filter-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        button { padding: 10px 20px; border: none; border-radius: 20px; background: #e2e8f0; cursor: pointer; font-weight: 600; }
        button.active { background: #dc2626; color: white; }
        .news-card { background: white; border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .category-tag { color: #dc2626; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .title { font-size: 1.1rem; color: #1e293b; margin: 0 0 10px 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="filter-nav" id="filters">
            <button class="active" onclick="filter('Todas', this)">Todas</button>
            <button onclick="filter('Horny Report', this)">Horny Report 🎙️</button>
        </div>
        <div id="news-container"></div>
    </div>

    <script>
        let allNews = [];

        async function init() {
            try {
                const res = await fetch('/api/news');
                allNews = await res.json();
                render(allNews);
            } catch (e) { document.getElementById('news-container').innerHTML = "Error de conexión."; }
        }

        function render(data) {
            const cont = document.getElementById('news-container');
            if (!data.length) { cont.innerHTML = "Sin contenido."; return; }
            
            cont.innerHTML = data.map(n => `
                <div class="news-card">
                    <span class="category-tag">${n.category || 'General'}</span>
                    <h3 class="title">${n.title || 'Sin título'}</h3>
                    <a href="${n.link}" target="_blank" style="color: #dc2626;">Revisar enlace →</a>
                </div>
            `).join('');
        }

        function filter(cat, btn) {
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(cat === 'Todas' ? allNews : allNews.filter(n => n.category === cat));
        }

        init();
    </script>
</body>
</html>
