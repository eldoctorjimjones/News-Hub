<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Admin Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; padding: 40px; margin: 0; }
        .box { max-width: 600px; margin: 40px auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        h2 { color: #dc2626; margin-top: 0; font-size: 1.8rem; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; font-size: 0.9rem; color: #cbd5e1; }
        input, textarea { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: white; box-sizing: border-box; font-family: inherit; font-size: 0.95rem; }
        input:focus, textarea:focus { border-color: #dc2626; outline: none; }
        textarea { height: 220px; resize: vertical; }
        button { width: 100%; padding: 14px; background: #dc2626; border: none; color: white; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 25px; transition: background 0.2s, transform 0.1s; font-size: 1rem; }
        button:hover { background: #b91c1c; transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        #status { margin-top: 20px; padding: 12px; border-radius: 6px; display: none; font-weight: 600; text-align: center; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="box">
    <h2>📡 Panel de Volcado de Inteligencia</h2>
    <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 20px;">Pega el bloque de texto plano del programa de la semana. El sistema aislará los enlaces automáticamente.</p>
    
    <label>Clave de Acceso</label>
    <input type="password" id="admin-key" placeholder="Introduce tu clave secreta">

    <label>Nombre del Programa</label>
    <input type="text" id="prog-name" placeholder="Ej: Horny Report 434">

    <label>Bloque de Texto Plano</label>
    <textarea id="raw-text" placeholder="Inmortal Vlad https://www.elconfidencial.com/...&#10;Remeras PaperClip https://www.minutouno.com/..."></textarea>

    <button onclick="enviarReporte()">Inyectar en Base de Datos 🚀</button>
    
    <div id="status"></div>
</div>

<script>
    async function enviarReporte() {
        const key = document.getElementById('admin-key').value;
        const name = document.getElementById('prog-name').value;
        const text = document.getElementById('raw-text').value;

        if (!key || !name || !text) {
            mostrarStatus("Por favor, rellena todos los campos.", "coral");
            return;
        }

        // PARSEO AUTOMÁTICO EN EL CLIENTE
        const lines = text.split('\n');
        const newsArray = [];
        const urlRegex = /(https?:\/\/[^\s]+)/g;

        lines.forEach(line => {
            const matches = line.match(urlRegex);
            if (matches) {
                const link = matches[0];
                let title = line.replace(link, '').trim();
                // Limpieza de guiones, puntos o dos puntos sueltos al inicio/fin del título
                title = title.replace(/^[:\-\|\s]+|[:\-\|\s]+$/g, '') || "Enlace de Inteligencia";

                newsArray.push({
                    title: title,
                    link: link,
                    category: "Horny Report",
                    name: name
                });
            }
        });

        if (newsArray.length === 0) {
            mostrarStatus("No se encontró ninguna URL válida en el texto.", "coral");
            return;
        }

        mostrarStatus(`Procesados ${newsArray.length} enlaces. Conectando al servidor...`, "#38bdf8");

        try {
            const response = await fetch('/api/news/bulk', { 
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${key}`
                },
                body: JSON.stringify({ news: newsArray })
            });

            if (response.ok) {
                mostrarStatus(`¡Éxito absoluto! ${newsArray.length} enlaces inyectados correctamente.`, "#22c55e");
                document.getElementById('raw-text').value = ''; // Limpiamos el cajón de texto
            } else {
                const errData = await response.json();
                mostrarStatus(`Error: ${errData.message || response.statusText}`, "#ef4444");
            }
        } catch (error) {
            mostrarStatus("Error de red. No se pudo conectar con el servidor backend.", "#ef4444");
        }
    }

    function mostrarStatus(msg, color) {
        const statusDiv = document.getElementById('status');
        statusDiv.style.display = 'block';
        statusDiv.style.backgroundColor = color + '15';
        statusDiv.style.color = color;
        statusDiv.style.border = `1px solid ${color}`;
        statusDiv.innerText = msg;
    }
</script>
</body>
</html>
